name: Java - Artifact to ECR

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      java_version:
        description: 'Java version'
        required: false
        type: string
        default: '21'
      java_distribution:
        description: 'Java distribution'
        required: false
        type: string
        default: 'temurin'
      version:
        description: 'Version tag for Docker image (required)'
        required: true
        type: string
      push_latest:
        description: 'Also push :latest tag'
        required: false
        type: boolean
        default: true
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: '.'

    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true
      AWS_REGION:
        required: true
      ECR_REPOSITORY:
        required: true

    outputs:
      image_tag:
        description: 'Docker image tag pushed'
        value: ${{ jobs.artifact.outputs.image_tag }}
      image_uri:
        description: 'Full Docker image URI'
        value: ${{ jobs.artifact.outputs.image_uri }}

jobs:
  artifact:
    name: Build and Push to ECR
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.push-ecr.outputs.image_tag }}
      image_uri: ${{ steps.push-ecr.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ inputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java_distribution }}
          java-version: ${{ inputs.java_version }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew clean build -x test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        id: push-ecr
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.version }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          echo "Building Docker image..."
          docker build -t $IMAGE_URI ${{ inputs.dockerfile_path }}

          echo "Pushing Docker image to ECR..."
          docker push $IMAGE_URI

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            docker tag $IMAGE_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          fi

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

          echo "### Docker Image Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** $ECR_REGISTRY" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** $ECR_REPOSITORY" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** $IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **URI:** $IMAGE_URI" >> $GITHUB_STEP_SUMMARY
