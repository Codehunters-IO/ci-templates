name: Java - Artifact (Docker)

on:
  workflow_call:
    inputs:
      runner:
        description: 'The type of machine to run the job on'
        required: false
        type: string
        default: 'ubuntu-latest'
      version:
        description: 'Version to tag the Docker image (e.g. 1.2.3). If not provided, uses latest git tag or "latest"'
        required: false
        type: string
        default: ''
      branch:
        description: 'Branch name to include in the Docker tag'
        required: false
        type: string
        default: 'develop'

jobs:
  artifact:
    name: Docker Image
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Try to get latest tag, fallback to 'latest'
            if git describe --tags --abbrev=0 >/dev/null 2>&1; then
              VERSION="$(git describe --tags --abbrev=0 | sed 's/^v//')"
            else
              VERSION="latest"
            fi
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Using version: ${VERSION}"

      - name: Build Docker image
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "Building Docker image: ${REPO_NAME}-${{ inputs.branch }}:${{ steps.version.outputs.version }}"
          docker build -t ${REPO_NAME}-${{ inputs.branch }}:${{ steps.version.outputs.version }} .
