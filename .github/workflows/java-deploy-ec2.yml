name: Java - Deploy to EC2

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      environment:
        description: 'GitHub environment (develop, production)'
        required: false
        type: string
        default: 'develop'
      health_check_path:
        description: 'Health check endpoint (empty to skip)'
        required: false
        type: string
        default: ''
      health_check_timeout:
        description: 'Health check timeout in seconds'
        required: false
        type: number
        default: 120
      docker_platform:
        description: 'Docker platform for the container (linux/amd64, linux/arm64)'
        required: false
        type: string
        default: 'linux/amd64'
      memory_limit:
        description: 'Container memory limit (e.g., 512m, 1g)'
        required: false
        type: string
        default: '512m'
      memory_reservation:
        description: 'Container memory reservation (e.g., 256m, 512m)'
        required: false
        type: string
        default: '256m'

    secrets:
      AWS_ECR_URL:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      AWS_EC2_HOST:
        required: true
      AWS_EC2_USER:
        required: true
      AWS_EC2_SSH_KEY:
        required: true
      AWS_APP_PORT:
        required: true

    outputs:
      deploy_status:
        description: 'Deployment status'
        value: ${{ jobs.deploy.outputs.status }}
      deployed_image:
        description: 'Deployed image tag'
        value: ${{ jobs.deploy.outputs.image }}

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment }}
    timeout-minutes: 15

    outputs:
      status: ${{ steps.deploy.outputs.status }}
      image: ${{ inputs.image_tag }}

    steps:
      - name: Set repository name
        id: repo
        run: |
          REPO_NAME="${{ github.repository }}"
          # Extract only repo name (without org)
          REPO_NAME="${REPO_NAME##*/}"
          echo "name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "Repository name: $REPO_NAME"

      - name: Deploy via SSH
        id: deploy
        env:
          EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          EC2_USER: ${{ secrets.AWS_EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
          AWS_ECR_URL: ${{ secrets.AWS_ECR_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          APP_PORT: ${{ secrets.AWS_APP_PORT }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
          ENVIRONMENT: ${{ inputs.environment }}
          HEALTH_CHECK_PATH: ${{ inputs.health_check_path }}
          HEALTH_CHECK_TIMEOUT: ${{ inputs.health_check_timeout }}
          DOCKER_PLATFORM: ${{ inputs.docker_platform }}
          MEMORY_LIMIT: ${{ inputs.memory_limit }}
          MEMORY_RESERVATION: ${{ inputs.memory_reservation }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Create deployment script
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e

          DEPLOY_DIR="/opt/docker/${REPO_NAME}"

          echo "=========================================="
          echo "Deploying ${REPO_NAME}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "Environment: ${ENVIRONMENT}"
          echo "=========================================="

          # Create directory if not exists
          if [ ! -d "$DEPLOY_DIR" ]; then
            echo "Creating directory: $DEPLOY_DIR"
            sudo mkdir -p "$DEPLOY_DIR"
            sudo chown ${USER}:${USER} "$DEPLOY_DIR"
          fi
          cd "$DEPLOY_DIR"

          # Login to ECR
          echo "Logging in to ECR..."
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${AWS_ECR_URL}

          # Create docker-compose.yml
          echo "Creating docker-compose.yml..."
          cat > docker-compose.yml << EOF
          services:
            ${REPO_NAME}:
              image: ${AWS_ECR_URL}/${REPO_NAME}:${IMAGE_TAG}
              platform: ${DOCKER_PLATFORM}
              container_name: ${REPO_NAME}
              restart: unless-stopped
              ports:
                - "${APP_PORT}:8080"
              mem_limit: ${MEMORY_LIMIT}
              mem_reservation: ${MEMORY_RESERVATION}
              volumes:
                - ${REPO_NAME}:/app
              networks:
                - soldife_net
              logging:
                driver: "json-file"
                options:
                  max-size: "10m"
                  max-file: "3"

          volumes:
            ${REPO_NAME}:
              driver: local

          networks:
            soldife_net:
              external: true
          EOF

          # Create start.sh if not exists
          if [ ! -f "start.sh" ]; then
            echo "Creating start.sh..."
            cat > start.sh << 'STARTEOF'
          #!/usr/bin/env bash
          set -euo pipefail

          COMPOSE_FILE="${COMPOSE_FILE:-docker-compose.yml}"
          PROJECT_NAME="${PROJECT_NAME:-${REPO_NAME}}"

          echo "==> Starting stack (project: ${PROJECT_NAME}) using ${COMPOSE_FILE}"
          docker compose -p "${PROJECT_NAME}" -f "${COMPOSE_FILE}" up -d

          echo "==> Current status:"
          docker compose -p "${PROJECT_NAME}" -f "${COMPOSE_FILE}" ps

          echo "==> App logs (last 50 lines):"
          docker compose -p "${PROJECT_NAME}" -f "${COMPOSE_FILE}" logs --tail=50
          STARTEOF
            chmod +x start.sh
          fi

          # Create stop.sh if not exists
          if [ ! -f "stop.sh" ]; then
            echo "Creating stop.sh..."
            cat > stop.sh << 'STOPEOF'
          #!/usr/bin/env bash
          set -euo pipefail

          COMPOSE_FILE="${COMPOSE_FILE:-docker-compose.yml}"
          PROJECT_NAME="${REPO_NAME:-$(basename $(pwd))}"

          echo "==> Stopping stack (project: ${PROJECT_NAME})"
          docker compose -p "${PROJECT_NAME}" -f "${COMPOSE_FILE}" down

          echo "==> Done."
          echo "Tip: if you ALSO want to remove volumes (DATA LOSS), run:"
          echo "  docker compose -p \"${PROJECT_NAME}\" -f \"${COMPOSE_FILE}\" down -v"
          STOPEOF
            chmod +x stop.sh
          fi

          # Stop existing container if running
          if docker ps -q -f name=${REPO_NAME} 2>/dev/null | grep -q .; then
            echo "Stopping existing container..."
            ./stop.sh || true
          fi

          # Start new container
          echo "Starting new container..."
          ./start.sh

          # Health check - Phase 1: Container status
          TIMEOUT=${HEALTH_CHECK_TIMEOUT:-120}
          ELAPSED=0

          echo "Waiting for container '${REPO_NAME}' to be running..."
          while [ $ELAPSED -lt $TIMEOUT ]; do
            CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' ${REPO_NAME} 2>/dev/null || echo "not_found")

            if [ "$CONTAINER_STATUS" = "running" ]; then
              echo "Container is running!"
              break
            elif [ "$CONTAINER_STATUS" = "exited" ] || [ "$CONTAINER_STATUS" = "dead" ]; then
              echo "Container failed with status: ${CONTAINER_STATUS}"
              echo "Container logs:"
              docker logs --tail=50 ${REPO_NAME} 2>&1 || true
              exit 1
            fi

            sleep 5
            ELAPSED=$((ELAPSED + 5))
            echo "Waiting for container... ($ELAPSED/$TIMEOUT seconds) [status: ${CONTAINER_STATUS}]"
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Container did not start after ${TIMEOUT} seconds"
            docker logs --tail=50 ${REPO_NAME} 2>&1 || true
            exit 1
          fi

          # Health check - Phase 2: HTTP endpoint (optional)
          if [ -n "${HEALTH_CHECK_PATH}" ]; then
            echo "Running HTTP health check on http://localhost:${APP_PORT}${HEALTH_CHECK_PATH}..."
            HEALTH_URL="http://localhost:${APP_PORT}${HEALTH_CHECK_PATH}"
            ELAPSED=0

            while [ $ELAPSED -lt $TIMEOUT ]; do
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")

              if [ "$HTTP_CODE" = "200" ]; then
                echo "HTTP health check passed! (HTTP ${HTTP_CODE})"
                break
              fi

              # Check container is still running
              if ! docker ps -q -f name=${REPO_NAME} | grep -q .; then
                echo "Container stopped unexpectedly during health check"
                docker logs --tail=50 ${REPO_NAME} 2>&1 || true
                exit 1
              fi

              sleep 5
              ELAPSED=$((ELAPSED + 5))
              echo "Waiting for HTTP response... ($ELAPSED/$TIMEOUT seconds) [HTTP ${HTTP_CODE}]"
            done

            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "HTTP health check failed after ${TIMEOUT} seconds"
              docker logs --tail=50 ${REPO_NAME} 2>&1 || true
              exit 1
            fi
          fi

          echo "Deployment completed successfully!"
          DEPLOY_SCRIPT

          # Copy and execute script on EC2
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/deploy.sh ${EC2_USER}@${EC2_HOST}:/tmp/deploy.sh

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} "
            chmod +x /tmp/deploy.sh && \
            REPO_NAME='${REPO_NAME}' \
            IMAGE_TAG='${IMAGE_TAG}' \
            AWS_ECR_URL='${AWS_ECR_URL}' \
            AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}' \
            AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}' \
            AWS_REGION='${AWS_REGION}' \
            APP_PORT='${APP_PORT}' \
            ENVIRONMENT='${ENVIRONMENT}' \
            HEALTH_CHECK_PATH='${HEALTH_CHECK_PATH}' \
            HEALTH_CHECK_TIMEOUT='${HEALTH_CHECK_TIMEOUT}' \
            DOCKER_PLATFORM='${DOCKER_PLATFORM}' \
            MEMORY_LIMIT='${MEMORY_LIMIT}' \
            MEMORY_RESERVATION='${MEMORY_RESERVATION}' \
            /tmp/deploy.sh
          "

          echo "status=success" >> $GITHUB_OUTPUT

          # Summary
          echo "### Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | $EC2_HOST |" >> $GITHUB_STEP_SUMMARY
          echo "| **Application** | $REPO_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | $IMAGE_TAG |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | $ENVIRONMENT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Port** | $APP_PORT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Directory** | /opt/docker/$REPO_NAME |" >> $GITHUB_STEP_SUMMARY
