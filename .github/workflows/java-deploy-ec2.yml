name: Java - Deploy to EC2

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      environment:
        description: 'Deployment environment (develop, staging, production)'
        required: false
        type: string
        default: 'develop'
      health_check_path:
        description: 'Health check endpoint (empty to skip)'
        required: false
        type: string
        default: ''
      health_check_timeout:
        description: 'Health check timeout in seconds'
        required: false
        type: number
        default: 120

    secrets:
      AWS_REGION:
        required: true
      ECR_REPOSITORY:
        required: true
      EC2_HOST:
        required: true
      EC2_USER:
        required: true
      EC2_SSH_KEY:
        required: true
      APP_PORT:
        required: true

    outputs:
      deploy_status:
        description: 'Deployment status'
        value: ${{ jobs.deploy.outputs.status }}
      deployed_image:
        description: 'Deployed image tag'
        value: ${{ jobs.deploy.outputs.image }}

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15

    outputs:
      status: ${{ steps.deploy.outputs.status }}
      image: ${{ inputs.image_tag }}

    steps:
      - name: Set repository name
        id: repo
        run: |
          REPO_NAME="${{ github.repository }}"
          # Extract only repo name (without org)
          REPO_NAME="${REPO_NAME##*/}"
          echo "name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "Repository name: $REPO_NAME"

      - name: Deploy via SSH
        id: deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          APP_PORT: ${{ secrets.APP_PORT }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
          ENVIRONMENT: ${{ inputs.environment }}
          HEALTH_CHECK_PATH: ${{ inputs.health_check_path }}
          HEALTH_CHECK_TIMEOUT: ${{ inputs.health_check_timeout }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Create deployment script
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e

          DEPLOY_DIR="/opt/docker/${REPO_NAME}"

          echo "=========================================="
          echo "Deploying ${REPO_NAME}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "Environment: ${ENVIRONMENT}"
          echo "=========================================="

          # Create directory if not exists
          if [ ! -d "$DEPLOY_DIR" ]; then
            echo "Creating directory: $DEPLOY_DIR"
            sudo mkdir -p "$DEPLOY_DIR"
            sudo chown ${USER}:${USER} "$DEPLOY_DIR"
          fi
          cd "$DEPLOY_DIR"

          # Get ECR registry URL
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          # Login to ECR
          echo "Logging in to ECR..."
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}

          # Create docker-compose.yml
          echo "Creating docker-compose.yml..."
          cat > docker-compose.yml << EOF
          services:
            ${REPO_NAME}:
              image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
              container_name: ${REPO_NAME}
              restart: unless-stopped
              ports:
                - "${APP_PORT}:8080"
              volumes:
                - ${REPO_NAME}:/var/log/app
              networks:
                - soldife_net
              logging:
                driver: "json-file"
                options:
                  max-size: "10m"
                  max-file: "3"

          volumes:
            ${REPO_NAME}:
              driver: local

          networks:
            soldife_net:
              external: true
          EOF

          # Create start.sh if not exists
          if [ ! -f "start.sh" ]; then
            echo "Creating start.sh..."
            cat > start.sh << 'STARTEOF'
          #!/bin/bash
          set -e
          echo "Pulling latest image..."
          docker compose pull
          echo "Starting containers..."
          docker compose up -d
          echo "Container status:"
          docker compose ps
          STARTEOF
            chmod +x start.sh
          fi

          # Create stop.sh if not exists
          if [ ! -f "stop.sh" ]; then
            echo "Creating stop.sh..."
            cat > stop.sh << 'STOPEOF'
          #!/bin/bash
          set -e
          echo "Stopping containers..."
          docker compose down
          echo "Containers stopped."
          STOPEOF
            chmod +x stop.sh
          fi

          # Stop existing container if running
          if docker ps -q -f name=${REPO_NAME} 2>/dev/null | grep -q .; then
            echo "Stopping existing container..."
            ./stop.sh || true
          fi

          # Start new container
          echo "Starting new container..."
          ./start.sh

          # Health check
          if [ -n "${HEALTH_CHECK_PATH}" ]; then
            echo "Running health check..."
            HEALTH_URL="http://localhost:${APP_PORT}${HEALTH_CHECK_PATH}"
            TIMEOUT=${HEALTH_CHECK_TIMEOUT:-120}
            ELAPSED=0

            while [ $ELAPSED -lt $TIMEOUT ]; do
              if curl -sf "$HEALTH_URL" > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
              echo "Waiting for app... ($ELAPSED/$TIMEOUT seconds)"
            done

            echo "Health check failed after ${TIMEOUT} seconds"
            exit 1
          fi

          echo "Deployment completed successfully!"
          DEPLOY_SCRIPT

          # Copy and execute script on EC2
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/deploy.sh ${EC2_USER}@${EC2_HOST}:/tmp/deploy.sh

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} "
            chmod +x /tmp/deploy.sh && \
            REPO_NAME='${REPO_NAME}' \
            IMAGE_TAG='${IMAGE_TAG}' \
            AWS_REGION='${AWS_REGION}' \
            ECR_REPOSITORY='${ECR_REPOSITORY}' \
            APP_PORT='${APP_PORT}' \
            ENVIRONMENT='${ENVIRONMENT}' \
            HEALTH_CHECK_PATH='${HEALTH_CHECK_PATH}' \
            HEALTH_CHECK_TIMEOUT='${HEALTH_CHECK_TIMEOUT}' \
            /tmp/deploy.sh
          "

          echo "status=success" >> $GITHUB_OUTPUT

          # Summary
          echo "### Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | $EC2_HOST |" >> $GITHUB_STEP_SUMMARY
          echo "| **Application** | $REPO_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | $IMAGE_TAG |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | $ENVIRONMENT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Port** | $APP_PORT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Directory** | /opt/docker/$REPO_NAME |" >> $GITHUB_STEP_SUMMARY
