name: Java - SonarQube Analysis

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      java_version:
        description: 'Java version'
        required: false
        type: string
        default: '21'
      java_distribution:
        description: 'Java distribution'
        required: false
        type: string
        default: 'temurin'
      skip_quality_gate:
        description: 'Skip Quality Gate check'
        required: false
        type: boolean
        default: false

    secrets:
      SONAR_HOST_URL:
        required: true
      SONAR_TOKEN:
        required: true

    outputs:
      quality_gate_status:
        description: 'Quality Gate status (OK, WARN, ERROR, NONE)'
        value: ${{ jobs.sonarqube.outputs.quality_gate_status }}

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read

    outputs:
      quality_gate_status: ${{ steps.quality-gate.outputs.quality-gate-status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ inputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java_distribution }}
          java-version: ${{ inputs.java_version }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run SonarQube analysis
        run: |
          ./gradlew sonarqube \
            -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            -Dsonar.login="${{ secrets.SONAR_TOKEN }}" \
            --no-daemon

      - name: Check Quality Gate
        id: quality-gate
        if: ${{ !inputs.skip_quality_gate }}
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate Summary
        if: ${{ !inputs.skip_quality_gate }}
        run: |
          echo "### SonarQube Quality Gate: ${{ steps.quality-gate.outputs.quality-gate-status }}" >> $GITHUB_STEP_SUMMARY
