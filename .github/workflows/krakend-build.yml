name: KrakenD - Build & Validate

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: '.'

jobs:
  build:
    name: Build & Validate
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t krakend-app:ci ${{ inputs.dockerfile_path }}

      - name: Validate KrakenD config
        run: |
          docker run --rm krakend-app:ci check -t -d -c /etc/krakend/krakend.tmpl

          echo "### KrakenD Config Validation" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Passed" >> $GITHUB_STEP_SUMMARY
