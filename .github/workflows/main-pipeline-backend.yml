name: main-pipeline-backend

on:
  workflow_call:
    inputs:
      runner:
        description: 'The type of machine to run the job on'
        required: false
        type: string
        default: 'ubuntu-latest'
      run_test:
        description: 'Run test job'
        required: false
        type: boolean
        default: false
      run_artifact:
        description: 'Run artifact (Docker) job'
        required: false
        type: boolean
        default: false
      run_sonarqube:
        description: 'Run SonarQube analysis job'
        required: false
        type: boolean
        default: false
      update_changelog:
        description: 'Generate and commit CHANGELOG.md during semver'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/java-build.yml
    with:
      runner: ${{ inputs.runner }}
    secrets: inherit

  semver:
    name: Semantic Version
    if: github.ref_name == 'develop'
    needs: build
    uses: ./.github/workflows/java-semver.yml
    with:
      runner: ${{ inputs.runner }}
      update_changelog: ${{ inputs.update_changelog }}
    secrets: inherit
    permissions:
      contents: write

  test:
    name: Test
    if: inputs.run_test
    needs: build
    uses: ./.github/workflows/java-test.yml
    with:
      runner: ${{ inputs.runner }}
    secrets: inherit

  artifact:
    name: Artifact
    if: |
      inputs.run_artifact && 
      (github.ref_name == 'develop' || github.ref_name == 'main') &&
      always() && 
      needs.build.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.semver.result == 'success' || needs.semver.result == 'skipped')
    needs: [build, semver, test]
    uses: ./.github/workflows/java-artifact.yml
    with:
      runner: ${{ inputs.runner }}
      version: ${{ needs.semver.outputs.version }}
      branch: ${{ github.ref_name }}
    secrets: inherit
