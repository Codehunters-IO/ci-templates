name: Java - Main Pipeline

on:
  workflow_call:
    inputs:
      # Runner configuration
      runner:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'

      # Java configuration
      java_version:
        description: 'Java version'
        required: false
        type: string
        default: '21'
      java_distribution:
        description: 'Java distribution'
        required: false
        type: string
        default: 'temurin'

      # Pipeline steps control
      run_build:
        description: 'Run build job'
        required: false
        type: boolean
        default: true
      run_test:
        description: 'Run test job (includes coverage)'
        required: false
        type: boolean
        default: false
      run_sonar:
        description: 'Run SonarQube analysis (requires run_test: true)'
        required: false
        type: boolean
        default: false
      run_owasp:
        description: 'Run OWASP Dependency Check (requires run_test: true)'
        required: false
        type: boolean
        default: false
      run_artifact:
        description: 'Build and push Docker image to ECR'
        required: false
        type: boolean
        default: false
      run_deploy:
        description: 'Deploy to EC2'
        required: false
        type: boolean
        default: false

      # Test options
      coverage_threshold:
        description: 'Minimum coverage percentage (0-100)'
        required: false
        type: number
        default: 0

      # Artifact options
      image_tag:
        description: 'Docker image tag (empty = commit SHA)'
        required: false
        type: string
        default: ''

      # Deploy options
      environment:
        description: 'Deployment environment'
        required: false
        type: string
        default: 'develop'
      health_check_path:
        description: 'Health check endpoint path'
        required: false
        type: string
        default: ''

    outputs:
      image_tag:
        description: 'Docker image tag pushed'
        value: ${{ jobs.artifact.outputs.image_tag }}
      image_uri:
        description: 'Full Docker image URI'
        value: ${{ jobs.artifact.outputs.image_uri }}
      coverage:
        description: 'Code coverage percentage'
        value: ${{ jobs.test.outputs.coverage_percentage }}
      quality_gate:
        description: 'SonarQube Quality Gate status'
        value: ${{ jobs.test.outputs.quality_gate_status }}

jobs:
  # ============================================
  # BUILD
  # ============================================
  build:
    name: Build
    if: inputs.run_build
    uses: ./.github/workflows/java-build.yml
    with:
      runner: ${{ inputs.runner }}
      java_version: ${{ inputs.java_version }}
      java_distribution: ${{ inputs.java_distribution }}
    secrets: inherit

  # ============================================
  # TEST & QUALITY (Tests + Coverage + Sonar)
  # ============================================
  test:
    name: Test & Quality
    if: inputs.run_test
    needs: build
    uses: ./.github/workflows/java-test.yml
    with:
      runner: ${{ inputs.runner }}
      java_version: ${{ inputs.java_version }}
      java_distribution: ${{ inputs.java_distribution }}
      run_coverage: true
      coverage_threshold: ${{ inputs.coverage_threshold }}
      run_sonar: ${{ inputs.run_sonar }}
      run_owasp: ${{ inputs.run_owasp }}
    secrets: inherit
    permissions:
      contents: read
      checks: write
      pull-requests: write

  # ============================================
  # ARTIFACT - Build Docker & Push to ECR
  # ============================================
  artifact:
    name: Build & Push ECR
    if: |
      inputs.run_artifact &&
      always() &&
      needs.build.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    needs: [build, test]
    uses: ./.github/workflows/java-artifact-ecr.yml
    with:
      runner: ${{ inputs.runner }}
      java_version: ${{ inputs.java_version }}
      java_distribution: ${{ inputs.java_distribution }}
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  # ============================================
  # DEPLOY - Deploy to EC2 via SSH
  # ============================================
  deploy:
    name: Deploy EC2
    if: |
      inputs.run_deploy &&
      always() &&
      needs.artifact.result == 'success'
    needs: [artifact]
    uses: ./.github/workflows/java-deploy-ec2.yml
    with:
      runner: ${{ inputs.runner }}
      image_tag: ${{ needs.artifact.outputs.image_tag }}
      environment: ${{ inputs.environment }}
      health_check_path: ${{ inputs.health_check_path }}
    secrets: inherit
