# DEPRECATED: Use shared-release.yml instead
name: "[DEPRECATED] React - Create Release"

on:
  workflow_call:
    inputs:
      base_branch:
        description: 'Branch to create release from'
        required: false
        type: string
        default: 'develop'
      target_branch:
        description: 'Target branch for PR'
        required: false
        type: string
        default: 'main'

    outputs:
      version:
        description: 'Release version'
        value: ${{ jobs.release.outputs.version }}
      release_branch:
        description: 'Release branch name'
        value: ${{ jobs.release.outputs.release_branch }}
      pr_number:
        description: 'Pull request number'
        value: ${{ jobs.release.outputs.pr_number }}
      pr_url:
        description: 'Pull request URL'
        value: ${{ jobs.release.outputs.pr_url }}

jobs:
  release:
    uses: ./.github/workflows/shared-release.yml
    with:
      base_branch: ${{ inputs.base_branch }}
      target_branch: ${{ inputs.target_branch }}
    secrets: inherit
