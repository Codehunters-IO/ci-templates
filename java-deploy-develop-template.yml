# Template for AWS EC2 deployment on merge to develop
# Plantilla para despliegue a AWS EC2 en merge a develop
#
# Usage: copy this file to .github/workflows/ in your microservice repository
# Uso: copie este archivo a .github/workflows/ en su repositorio de microservicio
# 
# Requirements / Requisitos:
# 1. Configure the following secrets in GitHub / Configurar los siguientes secrets en GitHub:
#    - AWS_ROLE_TO_ASSUME: ARN of the AWS IAM role / ARN del rol IAM de AWS
#    - AWS_REGION: AWS region (e.g., us-east-1) / Región de AWS (ej: us-east-1)
#    - ECR_REPOSITORY: ECR repository name / Nombre del repositorio ECR
#    - EC2_HOST: EC2 instance IP or hostname / IP o hostname del servidor EC2
#    - EC2_USER: SSH username (e.g., ec2-user, ubuntu) / Usuario SSH (ej: ec2-user, ubuntu)
#    - EC2_SSH_KEY: SSH private key for EC2 access / Clave privada SSH para acceder a EC2
#    - APP_NAME: Application name / Nombre de la aplicación
#    - APP_PORT: Port to expose the application / Puerto para exponer la aplicación
#
# 2. The EC2 server must have installed / El servidor EC2 debe tener instalado:
#    - Docker
#    - Docker Compose
#    - AWS CLI
#    - SSH access configured / Acceso SSH configurado
#
# 3. The repository must have a Dockerfile in the root / El repositorio debe tener un Dockerfile en la raíz

name: Java - Deploy to AWS EC2 (Develop)

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build:
    name: Build
    uses: soldife/ci-templates/.github/workflows/java-build.yml@main
    with:
      runner: ubuntu-latest
    secrets: inherit

  test:
    name: Test
    needs: build
    uses: soldife/ci-templates/.github/workflows/java-test.yml@main
    with:
      runner: ubuntu-latest
    secrets: inherit

  semver:
    name: Semantic Version
    needs: build
    uses: soldife/ci-templates/.github/workflows/java-semver.yml@main
    with:
      runner: ubuntu-latest
      update_changelog: true
    secrets: inherit
    permissions:
      contents: write

  artifact:
    name: Build and Push to ECR
    needs: [build, test, semver]
    if: |
      always() && 
      needs.build.result == 'success' &&
      needs.test.result == 'success' &&
      needs.semver.result == 'success'
    uses: soldife/ci-templates/.github/workflows/java-artifact-ecr.yml@main
    with:
      runner: ubuntu-latest
      version: ${{ needs.semver.outputs.version }}
      push_to_ecr: true
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  deploy:
    name: Deploy to EC2
    needs: [artifact, semver]
    uses: soldife/ci-templates/.github/workflows/java-deploy-ec2.yml@main
    with:
      runner: ubuntu-latest
      version: ${{ needs.semver.outputs.version }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write
