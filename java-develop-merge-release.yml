# Plantilla post-merge a develop → versión + CHANGELOG + artifact + Sonar (Gradle Java)
#
# Uso: copie este archivo a .github/workflows/ en su repositorio de microservicio
# Requisitos: definir secrets SONAR_HOST_URL y SONAR_TOKEN

name: Java - Merge a develop → Release pipeline

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  pipeline:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    uses: soldife/ci-templates/.github/workflows/main-pipeline-backend.yml@main
    with:
      run_test: true
      run_artifact: true
      update_changelog: true
    secrets: inherit
