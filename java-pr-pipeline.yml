# Plantilla para PRs → build + test (Gradle Java)
#
# Uso: copie este archivo a .github/workflows/ en su repositorio de microservicio

name: Java - PR Pipeline

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  pipeline:
    uses: soldife/ci-templates/.github/workflows/main-pipeline-backend.yml@main
    with:
      run_test: true
    secrets: inherit
