# Template: Deploy on merge to develop
# Copy to: .github/workflows/develop-deploy.yml
#
# Triggers on push to develop branch (after PR merge)
# Flow: build → test → artifact → deploy → delete branch → create release PR
# Image tag: commit SHA (7 chars)
#
# Required secrets:
#   AWS:
#   - AWS_ROLE_TO_ASSUME: ARN of AWS IAM role (for ECR push from GitHub)
#   - AWS_REGION: AWS region (e.g., us-east-1)
#   - ECR_REPOSITORY: ECR repository name
#
#   EC2:
#   - EC2_HOST: Server IP or hostname
#   - EC2_USER: SSH username (e.g., ubuntu, ec2-user)
#   - EC2_SSH_KEY: SSH private key
#   - APP_PORT: External port for the application
#
#   Optional:
#   - SONAR_HOST_URL: SonarQube server URL
#   - SONAR_TOKEN: SonarQube token
#   - NVD_API_KEY: NVD API key for OWASP

name: Deploy to Develop

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  id-token: write
  checks: write
  pull-requests: write

jobs:
  pipeline:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    uses: <org>/ci-templates/.github/workflows/main-pipeline-backend.yml@main
    with:
      run_build: true
      run_test: true
      run_sonar: true
      run_owasp: true
      run_artifact: true
      run_deploy: true
      run_cleanup: true
      run_release: true
      environment: 'develop'
      release_target_branch: 'main'
      health_check_path: '/actuator/health'
    secrets: inherit
