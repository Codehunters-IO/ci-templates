# Template: Deploy on merge to main (production)
# Copy to: .github/workflows/main-deploy.yml
#
# Triggers on push to main branch (after release merge)
# Runs: build + artifact + deploy (PRODUCTION environment)
#
# Required secrets: Same as develop-deploy.yml
# Note: Tests should have passed in release branch, only build and deploy here

name: Deploy to PRODUCTION

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    uses: <org>/ci-templates/.github/workflows/main-pipeline-backend.yml@main
    with:
      run_build: true
      run_test: false
      run_semver: false
      run_artifact: true
      run_deploy: true
      spring_profile: 'production'
      health_check_path: '/actuator/health'
    secrets: inherit
