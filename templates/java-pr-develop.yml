# Template: PR to develop validation
# Copy to: .github/workflows/pr-develop.yml
#
# Triggers on pull requests targeting develop branch
# Runs: build + test + coverage + sonar + quality gate
#
# Required secrets for SonarQube (optional):
#   - SONAR_HOST_URL: SonarQube server URL
#   - SONAR_TOKEN: SonarQube authentication token

name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  validate:
    uses: <org>/ci-templates/.github/workflows/main-pipeline-backend.yml@main
    with:
      run_build: true
      run_test: true
      run_sonar: true
      coverage_threshold: 0
    secrets: inherit
